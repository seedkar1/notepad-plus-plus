name: Veeru_TestBuildConf

on: [workflow_dispatch]
env:
  PYTHON_ALLOW_CACHE: true
  PYTHON_DIR_CACHE: D:\.cache\python

jobs:
  Veeru_TestBuildConf:

    runs-on: windows-latest
    steps:
#    - name: Checkout repo
#      uses: actions/checkout@v4
#      with:
#        submodules: true

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: List files
      working-directory: .
      run: |
           Get-ChildItem -Path "C:\Program Files\Microsoft SDKs" *>&1
           Get-ChildItem -Path "C:\Program Files (x86)\Microsoft SDKs" *>&1
           Get-ChildItem -Path "C:\Program Files (x86)\Microsoft SDKs\Windows" *>&1
           Get-ChildItem -Path "C:\Program Files (x86)\Microsoft SDKs\Windows Kits" *>&1
           Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" *>&1
           Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10" *>&1
